version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teachhub
      POSTGRES_USER: teachhub
      POSTGRES_PASSWORD: teachhub
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  livekit:
    image: livekit/livekit-server:latest
    command: ["--config", "/livekit.yaml"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml:ro

volumes:
  pgdata:
