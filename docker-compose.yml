services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teachhub
      POSTGRES_USER: teachhub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-teachhub}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teachhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:v1.10.0
    command: ["--config", "/livekit.yaml"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882-7892:7882-7892/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://teachhub:${DB_PASSWORD:-teachhub}@db:5432/teachhub?sslmode=disable
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      - GIN_MODE=release
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS}
      - PLATFORM_USER=${PLATFORM_USER:-owner}
      - PLATFORM_PASS=${PLATFORM_PASS}
      - PLATFORM_PATH=${PLATFORM_PATH:-/ctrl-p-8x3kf}
      - LIVEKIT_HOST=livekit
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-teachhub}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-teachhubsecretkey1234567890abc}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - uploads:/app/uploads
      - ./GeoLite2-Country.mmdb:/app/GeoLite2-Country.mmdb:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - livekit

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
