{{define "admin_head"}}
<!DOCTYPE html>
<html lang="{{.Lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeachHub Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            }
        }
    }
    </script>
    <style>
        .tab-active { border-bottom: 2px solid #6366f1; color: #6366f1; font-weight: 600; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 0.75rem; transition: all 0.15s; }
        .card:hover { border-color: #c7d2fe; box-shadow: 0 1px 3px 0 rgba(99,102,241,0.08); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; border-radius: 0.5rem; font-weight: 500; transition: all 0.15s; }
        .btn-primary:hover { box-shadow: 0 4px 12px rgba(99,102,241,0.35); transform: translateY(-1px); }
        .input { border: 1px solid #d1d5db; border-radius: 0.5rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; transition: all 0.15s; outline: none; }
        .input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .badge { font-size: 0.75rem; font-weight: 500; padding: 0.125rem 0.5rem; border-radius: 9999px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <nav class="bg-gradient-to-r from-indigo-600 to-indigo-700 text-white px-4 py-3 shadow-lg">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <a href="/admin" class="text-lg font-bold tracking-tight flex items-center gap-2">📚 TeachHub <span class="text-indigo-200 text-xs font-normal">admin</span></a>
            <div class="flex items-center gap-3">
                {{if eq .Lang "fr"}}<a href="/set-lang?lang=en" class="text-xs text-indigo-200 hover:text-white transition">🇬🇧 EN</a>{{else}}<a href="/set-lang?lang=fr" class="text-xs text-indigo-200 hover:text-white transition">🇫🇷 FR</a>{{end}}
                <a href="/admin/logout" class="text-sm text-indigo-200 hover:text-white transition">{{t .Lang "nav_logout"}}</a>
            </div>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto px-4 py-8">
{{end}}

{{define "admin_foot"}}
    </main>
</body>
</html>
{{end}}
