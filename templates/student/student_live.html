{{template "student_live_head" .}}

<!-- Toast notification container -->
<div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

<div class="flex flex-col h-full overflow-hidden">
    <!-- Header bar -->
    <div class="bg-gradient-to-r from-gray-900 to-gray-800 text-white px-3 py-2 md:px-5 md:py-2.5 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-2 min-w-0">
            <a href="/classroom/{{.Classroom.ID}}" class="text-gray-400 hover:text-white flex-shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse flex-shrink-0"></span>
            <h1 class="font-bold text-sm md:text-lg truncate">{{.Classroom.Name}}</h1>
        </div>
        <div class="flex items-center gap-1.5 text-xs md:text-sm text-gray-300 flex-shrink-0">
            <span id="pCount">0</span>
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </div>
    </div>

    <!-- Main Stage -->
    <div id="mainStage" class="flex-1 bg-gray-900 relative min-h-0 flex items-center justify-center overflow-hidden">
        <div id="placeholder" class="text-center">
            <div class="text-4xl mb-2">&#128249;</div>
            <p class="text-sm md:text-base font-medium text-gray-400">{{t .Lang "connecting"}}</p>
        </div>
        <!-- PiP overlay (teacher cam when screen share is on stage) -->
        <div id="pipOverlay" class="absolute top-2 right-2 md:top-3 md:right-3 w-28 h-20 md:w-44 md:h-32 rounded-lg overflow-hidden shadow-2xl border-2 border-gray-700 cursor-pointer hidden z-10 bg-gray-800" onclick="pinFromPip()">
            <div id="pipLabel" class="absolute bottom-0.5 left-0.5 bg-black/60 text-white text-[8px] md:text-[10px] px-1 py-0.5 rounded-full z-10">{{t .Lang "teacher_label"}}</div>
        </div>
    </div>

    <!-- Camera status banner -->
    <div id="camStatus" class="bg-gray-800 text-center py-1 text-xs md:text-sm hidden flex-shrink-0">
        <span id="camStatusText" class="text-gray-400"></span>
    </div>

    <!-- Filmstrip -->
    <div id="filmstrip" class="bg-gray-950 flex-shrink-0 hidden">
        <div id="filmstripInner" class="flex gap-1 p-1 md:p-1.5 overflow-x-auto scrollbar-hide" style="-webkit-overflow-scrolling:touch;"></div>
    </div>

    <!-- Controls bar -->
    <div class="bg-gray-900 border-t border-gray-800 px-2 py-1.5 md:px-4 md:py-2 flex items-center justify-center gap-2 md:gap-2.5 flex-shrink-0">
        <button id="toggleMic" onclick="toggleMicrophone()" class="bg-gray-700 hover:bg-gray-600 text-white p-2 lg:p-2.5 rounded-full transition" title="{{t .Lang "microphone"}}">
            <svg id="micOn" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m7 7v4m-4 0h8M12 1a3 3 0 00-3 3v4a3 3 0 006 0V4a3 3 0 00-3-3z"/></svg>
            <svg id="micOff" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"/></svg>
        </button>

        <button id="toggleCam" onclick="toggleCamera()" class="bg-gray-800 text-gray-500 p-2 lg:p-2.5 rounded-full transition cursor-not-allowed opacity-50" title="{{t .Lang "camera"}}" disabled>
            <svg id="camOn" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            <svg id="camOff" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
        </button>

        <button id="reqCamBtn" onclick="requestCamera()" class="bg-amber-500 hover:bg-amber-600 text-white p-2 lg:p-2.5 rounded-full transition text-sm font-medium flex items-center gap-1" title="{{t .Lang "request_camera"}}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            <span class="hidden md:inline">{{t .Lang "request_camera"}}</span>
        </button>

        <button id="handBtn" onclick="toggleHand()" class="bg-gray-700 hover:bg-gray-600 text-white p-2 lg:p-2.5 rounded-full transition relative" title="{{t .Lang "raise_hand"}}">
            <svg id="handIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0m-3 6a1.5 1.5 0 00-3 0v2a7.5 7.5 0 0015 0v-5a1.5 1.5 0 00-3 0m-6-3V11m0-5.5v-1a1.5 1.5 0 013 0v1m0 0V11m0-5.5a1.5 1.5 0 013 0v3m0 0V11"/></svg>
        </button>

        <button id="chatToggleBtn" onclick="toggleChat()" class="bg-gray-700 hover:bg-gray-600 text-white p-2 lg:p-2.5 rounded-full transition relative" title="{{t .Lang "chat"}}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            <span id="chatBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
        </button>

        <a href="/classroom/{{.Classroom.ID}}" onclick="room.disconnect()" class="bg-red-600 hover:bg-red-700 text-white p-2 lg:p-2.5 rounded-full transition" title="{{t .Lang "leave"}}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </a>
    </div>
</div>

<!-- Chat Overlay -->
<div id="chatOverlay" class="fixed inset-0 z-40 hidden flex flex-col justify-end md:justify-center md:items-end md:pr-4 md:pb-20">
    <div class="bg-black/30 absolute inset-0" onclick="toggleChat()"></div>
    <div class="relative bg-white rounded-t-2xl md:rounded-2xl w-full md:w-96 flex flex-col shadow-2xl" style="max-height:60vh">
        <div class="flex items-center justify-between px-4 py-3 border-b rounded-t-2xl bg-gray-50">
            <h3 class="font-semibold text-gray-800 text-sm flex items-center gap-2">{{t .Lang "chat"}}</h3>
            <button onclick="toggleChat()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
        </div>
        <div id="chatMessages" class="flex-1 overflow-y-auto p-3 space-y-2" style="min-height:200px"></div>
        <div class="border-t p-2 flex gap-2">
            <input id="chatInput" type="text" placeholder="{{t .Lang "type_message"}}" class="input flex-1 text-sm py-1.5" onkeydown="if(event.key==='Enter')sendChatMessage()">
            <button onclick="sendChatMessage()" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-indigo-700 transition">{{t .Lang "send"}}</button>
        </div>
    </div>
</div>

<style>
.scrollbar-hide::-webkit-scrollbar { display: none; }
.scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
@keyframes hand-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
.hand-raised { animation: hand-pulse 1.5s ease-in-out infinite; background: #f59e0b !important; }
.hand-raised:hover { background: #d97706 !important; }
#mainStage > video { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; }
#pipOverlay video { width: 100%; height: 100%; object-fit: cover; }
.film-thumb { flex-shrink: 0; width: 100px; height: 58px; border-radius: 0.375rem; overflow: hidden; background: #1f2937; position: relative; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
.film-thumb:hover { border-color: #6366f1; }
.film-thumb.active { border-color: #818cf8; }
.film-thumb.speaking { border-color: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.4); }
.film-thumb video { width: 100%; height: 100%; object-fit: cover; }
.film-thumb .thumb-label { position: absolute; bottom: 1px; left: 1px; background: rgba(0,0,0,0.6); color: white; font-size: 9px; padding: 1px 4px; border-radius: 9999px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: calc(100% - 8px); }
@media (min-width: 768px) {
    .film-thumb { width: 140px; height: 80px; }
    .film-thumb .thumb-label { font-size: 10px; padding: 1px 6px; }
}
/* Poll */
@keyframes bar-grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
.poll-bar { transform-origin: left; animation: bar-grow 0.6s ease-out; }
/* Pinned */
.pinned-bar { background: linear-gradient(90deg, #fef3c7, #fde68a); border-left: 3px solid #f59e0b; }
/* Image on stage */
#mainStage > img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; z-index: 5; background: #111827; }
</style>

<!-- Poll Vote Overlay -->
<div id="pollVoteOverlay" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-black/50 absolute inset-0"></div>
    <div class="relative bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-r from-teal-600 to-teal-700 text-white px-4 py-3">
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                <span class="font-bold text-sm">{{t .Lang "poll_active"}}</span>
            </div>
            <div id="sPollTimer" class="text-xs mt-1 text-teal-100 hidden"></div>
        </div>
        <div class="p-4">
            <h3 id="sPollQuestion" class="font-bold text-gray-800 text-base mb-3"></h3>
            <div id="sPollOptions" class="space-y-2"></div>
        </div>
        <div id="sPollResultsSection" class="hidden p-4 pt-0">
            <div class="text-xs text-gray-500 mb-2">{{t .Lang "poll_results"}}</div>
            <div id="sPollBars" class="space-y-2"></div>
        </div>
    </div>
</div>

<!-- Whiteboard overlay (read-only) -->
<div id="wbOverlay" class="fixed inset-0 z-30 hidden flex flex-col bg-gray-900">
    <div class="bg-gray-800 border-b border-gray-700 px-3 py-2 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-2 text-white">
            <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            <span class="text-sm font-medium">{{t .Lang "whiteboard"}}</span>
            <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
        </div>
        <div class="flex items-center gap-1">
            <button onclick="sWbZoomOut()" class="text-gray-300 hover:text-white p-1.5 rounded transition" title="{{t .Lang "wb_zoom_out"}}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"/></svg>
            </button>
            <button onclick="sWbZoomReset()" id="sWbZoomLevel" class="text-gray-300 hover:text-white px-1.5 py-1 rounded text-xs font-mono min-w-[3rem] text-center transition" title="{{t .Lang "wb_zoom_reset"}}">100%</button>
            <button onclick="sWbZoomIn()" class="text-gray-300 hover:text-white p-1.5 rounded transition" title="{{t .Lang "wb_zoom_in"}}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7"/></svg>
            </button>
        </div>
    </div>
    <div class="flex-1 relative overflow-hidden bg-gray-900">
        <canvas id="wbCanvas" class="absolute inset-0 w-full h-full touch-none"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>
<script>
var LK = LivekitClient;
var room = new LK.Room({ adaptiveStream: true, dynacast: true });
var encoder = new TextEncoder();
var decoder = new TextDecoder();

var micEnabled = true, camEnabled = false, camApproved = false, camRequested = false;
var handRaised = false;

/* ─── Track Management ──────────────────────────── */
var trackMap = new Map();  // key → { participant, track, source, isTeacher }
var pinnedKey = null;      // user-pinned track (null = auto)
var autoPinned = null;

var msgCamApproved = '{{t .Lang "cam_approved_msg"}}';
var msgCamDenied = '{{t .Lang "cam_denied_msg"}}';
var msgCamOff = '{{t .Lang "cam_off_teacher"}}';
var msgCamWaiting = '{{t .Lang "cam_waiting"}}';
var msgCamSent = '{{t .Lang "toast_cam_sent"}}';
var msgCamApprovedShort = '{{t .Lang "toast_cam_approved_s"}}';
var msgCamDeniedShort = '{{t .Lang "toast_cam_denied_s"}}';
var msgMicMuted = '{{t .Lang "toast_mic_muted"}}';
var msgMicUnmuted = '{{t .Lang "toast_mic_unmuted"}}';
var msgAllMuted = '{{t .Lang "toast_all_muted_s"}}';
var msgCamOffS = '{{t .Lang "toast_cam_off_s"}}';
var msgClassEnded = '{{t .Lang "toast_class_ended"}}';
var msgAskTeacher = '{{t .Lang "toast_ask_teacher"}}';

/* ─── Toast ─────────────────────────────────────── */
function showToast(msg, type) {
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    var cl = {info:'bg-blue-500',success:'bg-green-500',warning:'bg-amber-500',error:'bg-red-500'};
    t.className = (cl[type]||cl.info)+' text-white px-3 py-1.5 rounded-lg shadow-lg text-xs md:text-sm font-medium transition-all transform translate-x-full';
    t.textContent = msg; c.appendChild(t);
    requestAnimationFrame(function() { t.classList.remove('translate-x-full'); });
    setTimeout(function() { t.classList.add('translate-x-full'); setTimeout(function() { t.remove(); }, 300); }, 3000);
}

function setCamStatus(text, color) {
    var bar = document.getElementById('camStatus');
    var span = document.getElementById('camStatusText');
    if (text) { bar.classList.remove('hidden'); span.textContent = text; span.className = color || 'text-gray-400'; }
    else { bar.classList.add('hidden'); }
}

/* ─── Data Channel ──────────────────────────────── */
function sendToTeacher(action) {
    var msg = JSON.stringify({ action: action });
    room.localParticipant.publishData(encoder.encode(msg), { reliable: true, destinationIdentities: ['admin'] });
}

room.on(LK.RoomEvent.DataReceived, function(payload, participant) {
    try {
        var msg = JSON.parse(decoder.decode(payload));
        switch(msg.action) {
            case 'chat':
                var chatSender = msg.sender || (participant ? (participant.name || participant.identity) : 'Unknown');
                addChatMessage(chatSender, msg.text, msg.time || new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), false, msg.mid);
                if (!chatOpen) { unreadCount++; var badge = document.getElementById('chatBadge'); badge.textContent = unreadCount; badge.classList.remove('hidden'); }
                break;
            case 'mute-mic':
                micEnabled = false; room.localParticipant.setMicrophoneEnabled(false); updateMicUI(); showToast(msgMicMuted, 'warning'); break;
            case 'unmute-mic':
                micEnabled = true; room.localParticipant.setMicrophoneEnabled(true); updateMicUI(); showToast(msgMicUnmuted, 'success'); break;
            case 'mute-all':
                micEnabled = false; room.localParticipant.setMicrophoneEnabled(false); updateMicUI(); showToast(msgAllMuted, 'warning'); break;
            case 'cam-off':
                camEnabled = false; camApproved = false; room.localParticipant.setCameraEnabled(false); updateCamUI(); disableCamButton();
                setCamStatus(msgCamOff, 'text-red-400'); showToast(msgCamOffS, 'warning'); break;
            case 'cam-approve':
                camApproved = true; camRequested = false; enableCamButton();
                setCamStatus(msgCamApproved, 'text-green-400'); showToast(msgCamApprovedShort, 'success'); break;
            case 'cam-deny':
                camApproved = false; camRequested = false;
                var reqBtn = document.getElementById('reqCamBtn'); reqBtn.disabled = false;
                var sp = reqBtn.querySelector('span'); if (sp) sp.textContent = '{{t .Lang "request_camera"}}';
                reqBtn.classList.remove('hidden'); setCamStatus(msgCamDenied, 'text-red-400'); showToast(msgCamDeniedShort, 'error'); break;
            case 'hand-lower':
                handRaised = false; updateHandUI(); showToast('{{t .Lang "toast_hand_lowered_t"}}', 'info'); break;
            case 'end-class':
                showToast(msgClassEnded, 'error');
                setTimeout(function() { room.disconnect(); window.location.href = '/classroom/{{.Classroom.ID}}'; }, 1500); break;
            case 'poll-start':
                showPollVote(msg.question, msg.options, msg.timer); break;
            case 'poll-end':
                showPollFinalResults(msg); break;
            case 'del-msg':
                var el = document.querySelector('[data-msg-id="' + msg.msgId + '"]'); if (el) el.remove(); break;
            case 'pin-message':
                showPinnedMessage(msg.sender, msg.text); break;
            case 'unpin-message':
                hidePinnedMessage(); break;
            case 'image-share':
                showSharedImage(msg.url); break;
            case 'image-stop':
                removeSharedImage(); break;
            case 'wb-open':
                openStudentWb(); break;
            case 'wb-close':
                closeStudentWb(); break;
            case 'wb-down':
                startStudentWbLive(msg.stroke); break;
            case 'wb-draw':
                drawStudentWbLive(msg.point); break;
            case 'wb-stroke':
                addStudentWbStroke(msg.stroke); break;
            case 'wb-undo':
                undoStudentWb(); break;
            case 'wb-clear':
                clearStudentWb(); break;
            case 'wb-bg':
                setStudentWbBg(msg.url); break;
            case 'wb-bg-rect':
                sWbImgRect = msg.rect; sWbRedrawAll(); break;
            case 'wb-bg-del':
                sWbBgObj = null; sWbImgRect = null; sWbRedrawAll(); break;
            case 'wb-zoom':
                if (msg.zoom && sWbCanvas) {
                    sWbScale = msg.zoom.s;
                    sWbPanX = msg.zoom.px * sWbCanvas.width;
                    sWbPanY = msg.zoom.py * sWbCanvas.height;
                    sWbRedrawAll();
                    var zl = document.getElementById('sWbZoomLevel'); if (zl) zl.textContent = Math.round(sWbScale * 100) + '%';
                } break;
        }
    } catch(e) { console.error('Data parse error:', e); }
});

/* ─── UI Updates ────────────────────────────────── */
function updateMicUI() {
    document.getElementById('micOn').classList.toggle('hidden', !micEnabled);
    document.getElementById('micOff').classList.toggle('hidden', micEnabled);
    document.getElementById('toggleMic').classList.toggle('bg-red-600', !micEnabled);
    document.getElementById('toggleMic').classList.toggle('bg-gray-700', micEnabled);
}
function updateCamUI() {
    document.getElementById('camOn').classList.toggle('hidden', !camEnabled);
    document.getElementById('camOff').classList.toggle('hidden', camEnabled);
    if (camApproved) {
        document.getElementById('toggleCam').classList.toggle('bg-red-600', !camEnabled);
        document.getElementById('toggleCam').classList.toggle('bg-gray-700', camEnabled);
    }
}
function enableCamButton() {
    var btn = document.getElementById('toggleCam');
    btn.disabled = false;
    btn.classList.remove('cursor-not-allowed', 'opacity-50', 'bg-gray-800', 'text-gray-500');
    btn.classList.add('bg-gray-700', 'hover:bg-gray-600', 'text-white');
    document.getElementById('reqCamBtn').classList.add('hidden');
}
function disableCamButton() {
    var btn = document.getElementById('toggleCam');
    btn.disabled = true;
    btn.classList.add('cursor-not-allowed', 'opacity-50', 'bg-gray-800', 'text-gray-500');
    btn.classList.remove('bg-gray-700', 'hover:bg-gray-600', 'text-white', 'bg-red-600');
    var reqBtn = document.getElementById('reqCamBtn'); reqBtn.classList.remove('hidden'); reqBtn.disabled = false;
    var textSpan = reqBtn.querySelector('span'); if (textSpan) textSpan.textContent = '{{t .Lang "request_camera"}}';
    camRequested = false;
}

/* ─── Controls ──────────────────────────────────── */
function toggleMicrophone() { micEnabled = !micEnabled; room.localParticipant.setMicrophoneEnabled(micEnabled); updateMicUI(); }
function toggleCamera() {
    if (!camApproved) { showToast(msgAskTeacher, 'warning'); return; }
    camEnabled = !camEnabled; room.localParticipant.setCameraEnabled(camEnabled); updateCamUI();
    if (camEnabled) setCamStatus('');
}
function requestCamera() {
    if (camRequested) return; camRequested = true; sendToTeacher('cam-request');

/* ─── Live Poll ─────────────────────────────────── */
var studentPollTimer = null;
var studentPollVoted = false;

function showPollVote(question, options, timer) {
    studentPollVoted = false;
    document.getElementById('sPollQuestion').textContent = question;
    document.getElementById('sPollResultsSection').classList.add('hidden');
    var container = document.getElementById('sPollOptions');
    container.innerHTML = '';
    var colors = ['bg-teal-500 hover:bg-teal-600', 'bg-indigo-500 hover:bg-indigo-600', 'bg-amber-500 hover:bg-amber-600', 'bg-rose-500 hover:bg-rose-600', 'bg-purple-500 hover:bg-purple-600', 'bg-cyan-500 hover:bg-cyan-600'];
    options.forEach(function(opt, i) {
        var btn = document.createElement('button');
        btn.className = 'w-full text-left px-4 py-3 rounded-xl text-white font-medium text-sm transition-all transform active:scale-95 ' + (colors[i] || colors[0]);
        btn.textContent = opt;
        btn.onclick = function() { votePoll(i); };
        container.appendChild(btn);
    });
    if (timer > 0) {
        var display = document.getElementById('sPollTimer');
        display.classList.remove('hidden');
        var remaining = timer;
        display.textContent = '{{t .Lang "poll_time_left"}}: ' + remaining + 's';
        studentPollTimer = setInterval(function() {
            remaining--;
            display.textContent = '{{t .Lang "poll_time_left"}}: ' + remaining + 's';
            if (remaining <= 0) {
                clearInterval(studentPollTimer); studentPollTimer = null;
                display.textContent = '{{t .Lang "poll_ended"}}';
            }
        }, 1000);
    } else {
        document.getElementById('sPollTimer').classList.add('hidden');
    }
    document.getElementById('pollVoteOverlay').classList.remove('hidden');
    showToast('📊 {{t .Lang "poll_active"}}', 'info');
}

function votePoll(optionIndex) {
    if (studentPollVoted) return;
    studentPollVoted = true;
    var msg = { action: 'poll-vote', optionIndex: optionIndex };
    room.localParticipant.publishData(encoder.encode(JSON.stringify(msg)), { reliable: true, destinationIdentities: ['admin'] });
    var btns = document.getElementById('sPollOptions').querySelectorAll('button');
    btns.forEach(function(btn, i) {
        btn.disabled = true;
        if (i === optionIndex) {
            btn.innerHTML = '✓ ' + btn.textContent;
            btn.classList.add('ring-2', 'ring-white', 'ring-offset-2');
        } else {
            btn.classList.add('opacity-50');
        }
    });
    showToast('{{t .Lang "poll_voted"}}', 'success');
}

function showPollFinalResults(msg) {
    if (studentPollTimer) { clearInterval(studentPollTimer); studentPollTimer = null; }
    document.getElementById('sPollResultsSection').classList.remove('hidden');
    var container = document.getElementById('sPollBars');
    container.innerHTML = '';
    var colors = ['bg-teal-500', 'bg-indigo-500', 'bg-amber-500', 'bg-rose-500', 'bg-purple-500', 'bg-cyan-500'];
    msg.options.forEach(function(opt, i) {
        var count = msg.votes[i] || 0;
        var pct = msg.total > 0 ? Math.round((count / msg.total) * 100) : 0;
        var div = document.createElement('div');
        div.innerHTML = '<div class="flex justify-between text-xs mb-0.5"><span class="text-gray-700 font-medium">' + opt + '</span>'
            + '<span class="text-gray-500">' + count + ' (' + pct + '%)</span></div>'
            + '<div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">'
            + '<div class="poll-bar ' + (colors[i] || colors[0]) + ' h-2.5 rounded-full" style="width:' + pct + '%"></div></div>';
        container.appendChild(div);
    });
    var btns = document.getElementById('sPollOptions').querySelectorAll('button');
    btns.forEach(function(btn) { btn.disabled = true; btn.classList.add('opacity-60'); });
    var display = document.getElementById('sPollTimer');
    display.classList.remove('hidden');
    display.textContent = '{{t .Lang "poll_ended"}}';
    setTimeout(function() {
        document.getElementById('pollVoteOverlay').classList.add('hidden');
    }, 5000);
}

/* ─── Whiteboard Receiver ───────────────────────── */
var sWbCanvas, sWbCtx;
var sWbStrokes = [];
var sWbBgObj = null;
var sWbImgRect = null;
var sWbLiveStroke = null;
var sWbScale = 1, sWbPanX = 0, sWbPanY = 0, sWbPinching = false, sWbPinchCooldown = false;
var sWbPinchDist0 = 0, sWbPinchScale0 = 1, sWbPinchMidX0 = 0, sWbPinchMidY0 = 0, sWbPinchPanX0 = 0, sWbPinchPanY0 = 0;

function startStudentWbLive(stroke) {
    sWbLiveStroke = { tool: stroke.tool, color: stroke.color, width: stroke.width, alpha: stroke.alpha, points: stroke.points.slice() };
    sWbRedrawAll();
}

function drawStudentWbLive(point) {
    if (!sWbLiveStroke) return;
    sWbLiveStroke.points.push(point);
    sWbRedrawAll();
}

function sWbZoomAt(ns, cx, cy) {
    ns = Math.max(0.25, Math.min(5, ns));
    sWbPanX = cx - (cx - sWbPanX) * (ns / sWbScale);
    sWbPanY = cy - (cy - sWbPanY) * (ns / sWbScale);
    sWbScale = ns; sWbRedrawAll();
    var el = document.getElementById('sWbZoomLevel'); if (el) el.textContent = Math.round(sWbScale * 100) + '%';
}
function sWbZoomIn() { sWbZoomAt(sWbScale * 1.25, sWbCanvas.width / 2, sWbCanvas.height / 2); }
function sWbZoomOut() { sWbZoomAt(sWbScale / 1.25, sWbCanvas.width / 2, sWbCanvas.height / 2); }
function sWbZoomReset() {
    sWbScale = 1; sWbPanX = 0; sWbPanY = 0; sWbRedrawAll();
    var el = document.getElementById('sWbZoomLevel'); if (el) el.textContent = '100%';
}
function sWbTouchDist(a, b) { var dx = a.clientX - b.clientX, dy = a.clientY - b.clientY; return Math.sqrt(dx * dx + dy * dy); }
function sWbTouchMid(a, b, rect, cw, ch) {
    return {
        x: ((a.clientX + b.clientX) / 2 - rect.left) * (cw / rect.width),
        y: ((a.clientY + b.clientY) / 2 - rect.top) * (ch / rect.height)
    };
}

function initStudentWb() {
    sWbCanvas = document.getElementById('wbCanvas');
    if (!sWbCanvas) return;
    sWbCtx = sWbCanvas.getContext('2d');
    window.addEventListener('resize', resizeStudentWb);
    /* Pinch-to-zoom+pan */
    sWbCanvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (e.touches.length === 2) {
            sWbPinching = true;
            sWbPinchDist0 = sWbTouchDist(e.touches[0], e.touches[1]);
            sWbPinchScale0 = sWbScale;
            var rect = sWbCanvas.getBoundingClientRect();
            var mid = sWbTouchMid(e.touches[0], e.touches[1], rect, sWbCanvas.width, sWbCanvas.height);
            sWbPinchMidX0 = mid.x; sWbPinchMidY0 = mid.y;
            sWbPinchPanX0 = sWbPanX; sWbPinchPanY0 = sWbPanY;
        }
    }, { passive: false });
    sWbCanvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (sWbPinching && e.touches.length === 2) {
            var dist = sWbTouchDist(e.touches[0], e.touches[1]);
            var ns = Math.max(0.25, Math.min(5, sWbPinchScale0 * (dist / sWbPinchDist0)));
            var rect = sWbCanvas.getBoundingClientRect();
            var mid = sWbTouchMid(e.touches[0], e.touches[1], rect, sWbCanvas.width, sWbCanvas.height);
            var ratio = ns / sWbPinchScale0;
            sWbPanX = mid.x - (sWbPinchMidX0 - sWbPinchPanX0) * ratio;
            sWbPanY = mid.y - (sWbPinchMidY0 - sWbPinchPanY0) * ratio;
            sWbScale = ns; sWbRedrawAll();
            var el = document.getElementById('sWbZoomLevel'); if (el) el.textContent = Math.round(sWbScale * 100) + '%';
        }
    }, { passive: false });
    sWbCanvas.addEventListener('touchend', function(e) {
        if (e.touches.length < 2 && sWbPinching) {
            sWbPinching = false;
            sWbPinchCooldown = true;
            setTimeout(function() { sWbPinchCooldown = false; }, 300);
        }
    }, { passive: false });
    sWbCanvas.addEventListener('touchcancel', function(e) { sWbPinching = false; }, { passive: false });
    /* Mouse wheel zoom */
    sWbCanvas.addEventListener('wheel', function(e) {
        e.preventDefault();
        var rect = sWbCanvas.getBoundingClientRect();
        var cx = (e.clientX - rect.left) * (sWbCanvas.width / rect.width);
        var cy = (e.clientY - rect.top) * (sWbCanvas.height / rect.height);
        sWbZoomAt(sWbScale * (e.deltaY < 0 ? 1.1 : 0.9), cx, cy);
    }, { passive: false });
}

function resizeStudentWb() {
    if (!sWbCanvas || !sWbCanvas.parentElement) return;
    var parent = sWbCanvas.parentElement;
    sWbCanvas.width = parent.clientWidth;
    sWbCanvas.height = parent.clientHeight;
    sWbRedrawAll();
}

function openStudentWb() {
    document.getElementById('wbOverlay').classList.remove('hidden');
    resizeStudentWb();
    showToast('{{t .Lang "wb_opened"}}', 'success');
}

function closeStudentWb() {
    document.getElementById('wbOverlay').classList.add('hidden');
    showToast('{{t .Lang "wb_closed"}}', 'info');
}

function addStudentWbStroke(stroke) {
    sWbLiveStroke = null;
    sWbStrokes.push(stroke);
    sWbRedrawAll();
}

function undoStudentWb() {
    if (sWbStrokes.length > 0) sWbStrokes.pop();
    sWbRedrawAll();
}

function clearStudentWb() {
    sWbStrokes = [];
    sWbBgObj = null;
    sWbImgRect = null;
    sWbScale = 1; sWbPanX = 0; sWbPanY = 0;
    var zl = document.getElementById('sWbZoomLevel'); if (zl) zl.textContent = '100%';
    sWbRedrawAll();
}

function setStudentWbBg(url) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() { sWbBgObj = img; sWbRedrawAll(); };
    img.src = url;
}

function sDrawStroke(stroke) {
    if (!sWbCtx || stroke.points.length < 2) return;
    sWbCtx.save();
    sWbCtx.lineCap = 'round';
    sWbCtx.lineJoin = 'round';
    sWbCtx.globalAlpha = stroke.alpha || 1;
    if (stroke.color === 'eraser') {
        sWbCtx.globalCompositeOperation = 'destination-out';
        sWbCtx.strokeStyle = 'rgba(0,0,0,1)';
    } else {
        sWbCtx.globalCompositeOperation = 'source-over';
        sWbCtx.strokeStyle = stroke.color;
    }
    var w = sWbCanvas.width, h = sWbCanvas.height;
    var pts = stroke.points;
    sWbCtx.beginPath();
    sWbCtx.moveTo(pts[0].x * w, pts[0].y * h);
    if (pts.length === 2) {
        sWbCtx.lineWidth = stroke.width * (pts[0].p + pts[1].p);
        sWbCtx.lineTo(pts[1].x * w, pts[1].y * h);
    } else {
        for (var i = 1; i < pts.length - 1; i++) {
            var pressure = pts[i].p || 0.5;
            sWbCtx.lineWidth = stroke.width * (pressure + 0.5);
            var cx = (pts[i].x * w + pts[i + 1].x * w) / 2;
            var cy = (pts[i].y * h + pts[i + 1].y * h) / 2;
            sWbCtx.quadraticCurveTo(pts[i].x * w, pts[i].y * h, cx, cy);
        }
        var last = pts[pts.length - 1];
        sWbCtx.lineTo(last.x * w, last.y * h);
    }
    sWbCtx.stroke();
    sWbCtx.restore();
}

function sWbRedrawAll() {
    if (!sWbCtx) return;
    var cw = sWbCanvas.width, ch = sWbCanvas.height;
    sWbCtx.setTransform(1, 0, 0, 1, 0, 0);
    sWbCtx.clearRect(0, 0, cw, ch);
    sWbCtx.setTransform(sWbScale, 0, 0, sWbScale, sWbPanX, sWbPanY);
    if (sWbBgObj && sWbImgRect) {
        sWbCtx.drawImage(sWbBgObj, sWbImgRect.x * cw, sWbImgRect.y * ch, sWbImgRect.w * cw, sWbImgRect.h * ch);
    }
    for (var i = 0; i < sWbStrokes.length; i++) {
        sDrawStroke(sWbStrokes[i]);
    }
    if (sWbLiveStroke && sWbLiveStroke.points.length > 1) {
        sDrawStroke(sWbLiveStroke);
    }
}

document.addEventListener('DOMContentLoaded', initStudentWb);

/* ═══════════════════════════════════════════════════
   SPOTLIGHT + FILMSTRIP VIDEO LAYOUT
   ═══════════════════════════════════════════════════ */

function makeKey(p, t) { return p.sid + '-' + t.sid; }

function isScreenShare(track) {
    return track.source === LK.Track.Source.ScreenShare || track.source === 'screen_share' || track.source === LK.Track.Source.ScreenShareAudio;
}

function getLabel(entry) {
    if (entry.isTeacher) return entry.source === 'screen_share' ? '{{t .Lang "teacher_screen"}}' : '{{t .Lang "teacher_label"}}';
    return entry.participant.name || entry.participant.identity;
}

/* Auto-select: teacher screen > teacher cam > first track */
function pickAuto() {
    var tScreen = null, tCam = null, first = null;
    trackMap.forEach(function(e, k) {
        if (!first) first = k;
        if (e.isTeacher && e.source === 'screen_share') tScreen = k;
        else if (e.isTeacher && e.source !== 'screen_share') tCam = k;
    });
    return tScreen || tCam || first || null;
}

/* Full re-render of main stage + filmstrip + PiP */
function renderLayout() {
    var stage = document.getElementById('mainStage');
    var filmstrip = document.getElementById('filmstrip');
    var filmInner = document.getElementById('filmstripInner');
    var pip = document.getElementById('pipOverlay');
    var ph = document.getElementById('placeholder');

    /* Clear previous video on stage */
    var old = stage.querySelector(':scope > video');
    if (old) old.remove();

    if (trackMap.size === 0) {
        pip.classList.add('hidden'); filmstrip.classList.add('hidden');
        if (ph) ph.style.display = ''; return;
    }
    if (ph) ph.style.display = 'none';

    /* Pick main stage track */
    var activeKey = pinnedKey && trackMap.has(pinnedKey) ? pinnedKey : pickAuto();
    autoPinned = activeKey;
    var mainEntry = trackMap.get(activeKey);

    /* Render main stage */
    if (mainEntry) {
        var el = mainEntry.track.attach();
        el.style.objectFit = mainEntry.source === 'screen_share' ? 'contain' : 'contain';
        stage.insertBefore(el, stage.firstChild);
    }

    /* PiP: teacher cam when teacher screen is on stage */
    var teacherCamKey = null;
    trackMap.forEach(function(e, k) { if (e.isTeacher && e.source !== 'screen_share') teacherCamKey = k; });
    var showPip = mainEntry && mainEntry.isTeacher && mainEntry.source === 'screen_share' && teacherCamKey && teacherCamKey !== activeKey;

    var pipVid = pip.querySelector('video'); if (pipVid) pipVid.remove();
    if (showPip) {
        var camEntry = trackMap.get(teacherCamKey);
        if (camEntry) { var pv = camEntry.track.attach(); pv.className = 'w-full h-full object-cover'; pip.insertBefore(pv, pip.firstChild); pip.classList.remove('hidden'); }
    } else { pip.classList.add('hidden'); }

    /* Filmstrip: everything except main stage + PiP tracks */
    filmInner.innerHTML = '';
    var count = 0;
    trackMap.forEach(function(entry, key) {
        if (key === activeKey) return;
        if (showPip && key === teacherCamKey) return;
        count++;
        var thumb = document.createElement('div');
        thumb.className = 'film-thumb' + (key === pinnedKey ? ' active' : '');
        thumb.setAttribute('data-key', key);
        thumb.onclick = function() { pinTrack(key); };
        var vid = entry.track.attach(); vid.className = 'w-full h-full object-cover';
        thumb.appendChild(vid);
        var lbl = document.createElement('div'); lbl.className = 'thumb-label'; lbl.textContent = getLabel(entry);
        thumb.appendChild(lbl);
        filmInner.appendChild(thumb);
    });
    filmstrip.classList.toggle('hidden', count === 0);
}

function pinTrack(key) { pinnedKey = (pinnedKey === key) ? null : key; renderLayout(); }
function pinFromPip() {
    trackMap.forEach(function(e, k) { if (e.isTeacher && e.source !== 'screen_share') pinTrack(k); });
}

function addTrack(participant, track) {
    var key = makeKey(participant, track);
    if (trackMap.has(key)) return;
    var source = isScreenShare(track) ? 'screen_share' : 'camera';
    trackMap.set(key, { participant: participant, track: track, source: source, isTeacher: participant.identity === 'admin' });
    if (participant.identity === 'admin' && source === 'screen_share') pinnedKey = null;
    renderLayout();
}

function removeTrack(participant, track) {
    var key = makeKey(participant, track);
    var entry = trackMap.get(key);
    if (entry) entry.track.detach().forEach(function(el) { el.remove(); });
    trackMap.delete(key);
    if (pinnedKey === key) pinnedKey = null;
    renderLayout();
}

/* ─── Room Events ───────────────────────────────── */
room.on(LK.RoomEvent.TrackSubscribed, function(track, pub, participant) {
    if (track.kind === LK.Track.Kind.Video) addTrack(participant, track);
    else if (track.kind === LK.Track.Kind.Audio) { var el = track.attach(); el.id = 'audio-' + participant.sid; document.body.appendChild(el); }
});
room.on(LK.RoomEvent.TrackUnsubscribed, function(track, pub, participant) {
    if (track.kind === LK.Track.Kind.Video) removeTrack(participant, track);
    else track.detach().forEach(function(el) { el.remove(); });
});
room.on(LK.RoomEvent.LocalTrackPublished, function(pub) {
    if (pub.track && pub.track.kind === LK.Track.Kind.Video) addTrack(room.localParticipant, pub.track);
});
room.on(LK.RoomEvent.LocalTrackUnpublished, function(pub) {
    if (pub.track && pub.track.kind === LK.Track.Kind.Video) removeTrack(room.localParticipant, pub.track);
});

function updateParticipantCount() { document.getElementById('pCount').textContent = room.numParticipants + 1; }
room.on(LK.RoomEvent.ParticipantConnected, updateParticipantCount);
room.on(LK.RoomEvent.ParticipantDisconnected, updateParticipantCount);
room.on(LK.RoomEvent.Disconnected, function() { window.location.href = '/classroom/{{.Classroom.ID}}'; });

/* Active speaker glow on filmstrip */
room.on(LK.RoomEvent.ActiveSpeakersChanged, function(speakers) {
    var sids = {}; speakers.forEach(function(p) { sids[p.sid] = true; });
    document.querySelectorAll('.film-thumb').forEach(function(el) {
        var k = el.getAttribute('data-key'); if (!k) return;
        var entry = trackMap.get(k);
        el.classList.toggle('speaking', entry && sids[entry.participant.sid] ? true : false);
    });
});

/* ─── Connect ───────────────────────────────────── */
async function connectRoom() {
    try {
        await room.connect('{{.LKUrl}}', '{{.Token}}');
        console.log('Connected to room:', room.name);
        updateParticipantCount();
        var ph = document.getElementById('placeholder');
        if (ph) ph.innerHTML = '<div class="text-center"><div class="text-4xl mb-2">&#9989;</div><p class="text-sm font-medium text-green-400">{{t .Lang "connected_waiting"}}</p><p class="text-xs text-gray-500 mt-1">{{t .Lang "connected_waiting_hint"}}</p></div>';
        await room.localParticipant.setMicrophoneEnabled(true);
    } catch(e) {
        console.error('Connection failed:', e);
        var ph = document.getElementById('placeholder');
        if (ph) ph.innerHTML = '<div class="text-center"><div class="text-4xl mb-2">&#9888;&#65039;</div><p class="text-sm font-medium text-red-400">{{t .Lang "connection_failed"}}</p><p class="text-xs text-gray-500 mt-1">' + e.message + '</p></div>';
    }
}
connectRoom();
window.addEventListener('beforeunload', function() {
    navigator.sendBeacon('/classroom/{{.Classroom.ID}}/live/leave', '');
    room.disconnect();
});
</script>
