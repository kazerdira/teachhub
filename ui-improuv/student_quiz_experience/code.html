<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TeachHub - Immersive Quiz</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#5516be",
                        "primary-container": "#008558",
                        "secondary": "#4648d4",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#6063ee",
                        "tertiary-fixed": "#e9ddff",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e3e2df",
                        "outline-variant": "#bccabf",
                        "surface-dim": "#dbdad6",
                        "on-primary": "#ffffff",
                        "background": "#faf9f5",
                        "primary": "#006a44",
                        "on-error": "#ffffff",
                        "tertiary-container": "#8455ef",
                        "inverse-on-surface": "#f2f1ed",
                        "on-surface": "#1b1c1a",
                        "surface-tint": "#006c46",
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "on-primary-fixed": "#002112",
                        "surface-container": "#efeeea",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#3d4a41",
                        "surface-bright": "#faf9f5",
                        "inverse-surface": "#2f312e",
                        "surface-container-highest": "#e3e2df",
                        "surface-container-low": "#f4f4f0",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#07006c",
                        "on-tertiary-fixed": "#23005c",
                        "on-secondary-container": "#fffbff",
                        "on-primary-container": "#f6fff6",
                        "on-primary-fixed-variant": "#005234",
                        "error-container": "#ffdad6",
                        "surface": "#faf9f5",
                        "primary-fixed-dim": "#5ddda1",
                        "on-background": "#1b1c1a",
                        "primary-fixed": "#7bfabb",
                        "outline": "#6d7a71",
                        "surface-container-high": "#e9e8e4",
                        "inverse-primary": "#5ddda1",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#c0c1ff",
                        "on-tertiary-container": "#fffbff",
                        "tertiary": "#6b38d4",
                        "secondary-fixed": "#e1e0ff",
                        "tertiary-fixed-dim": "#d0bcff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body { font-family: 'Manrope', sans-serif; background-color: #faf9f5; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Top Navigation & Progress -->
<header class="w-full max-w-md px-6 pt-8 pb-4 flex flex-col gap-6 sticky top-0 bg-surface/80 backdrop-blur-md z-40">
<div class="flex justify-between items-center">
<button class="w-10 h-10 flex items-center justify-center rounded-full surface-container-highest hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<div class="flex items-center gap-2 px-4 py-2 rounded-full surface-container-lowest shadow-sm">
<span class="material-symbols-outlined text-primary text-xl">timer</span>
<span class="font-bold text-on-surface tracking-tight">08:45</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full surface-container-highest">
<span class="material-symbols-outlined text-on-surface">help_outline</span>
</button>
</div>
<!-- Question Progress Bar -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<span class="font-headline font-bold text-primary text-sm uppercase tracking-wider">Question 3 of 12</span>
<span class="font-body text-xs text-on-surface-variant font-medium">25% Complete</span>
</div>
<div class="h-2 w-full bg-primary-fixed-dim/30 rounded-full overflow-hidden">
<div class="h-full bg-primary w-[25%] rounded-full"></div>
</div>
</div>
</header>
<!-- Main Quiz Content -->
<main class="w-full max-w-md px-6 flex-grow flex flex-col justify-center py-8">
<div class="mb-10 text-center">
<div class="inline-block px-4 py-1.5 rounded-full bg-secondary-container/10 text-secondary text-xs font-bold uppercase tracking-widest mb-4">
                Calculus I
            </div>
<h1 class="text-3xl font-extrabold text-on-surface leading-tight tracking-tight">
                Quelle est la dérivée de f(x) = x² ?
            </h1>
</div>
<!-- Options Bento Grid -->
<div class="grid grid-cols-1 gap-4">
<!-- Selected Option -->
<button class="relative group p-6 rounded-lg bg-surface-container-lowest ring-2 ring-primary scale-[1.02] shadow-xl shadow-primary/5 transition-all flex items-center justify-between">
<div class="flex items-center gap-4">
<span class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold">A</span>
<span class="text-2xl font-headline font-bold text-on-surface">2x</span>
</div>
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Regular Option -->
<button class="group p-6 rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-all flex items-center justify-between border border-transparent hover:border-outline-variant/30">
<div class="flex items-center gap-4">
<span class="w-10 h-10 rounded-full surface-container-highest flex items-center justify-center text-on-surface-variant font-bold group-hover:bg-primary-container group-hover:text-white transition-colors">B</span>
<span class="text-2xl font-headline font-bold text-on-surface">x²</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant/30"></div>
</button>
<!-- Regular Option -->
<button class="group p-6 rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-all flex items-center justify-between border border-transparent hover:border-outline-variant/30">
<div class="flex items-center gap-4">
<span class="w-10 h-10 rounded-full surface-container-highest flex items-center justify-center text-on-surface-variant font-bold group-hover:bg-primary-container group-hover:text-white transition-colors">C</span>
<span class="text-2xl font-headline font-bold text-on-surface">1</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant/30"></div>
</button>
<!-- Regular Option -->
<button class="group p-6 rounded-lg bg-surface-container-lowest hover:bg-surface-container-low transition-all flex items-center justify-between border border-transparent hover:border-outline-variant/30">
<div class="flex items-center gap-4">
<span class="w-10 h-10 rounded-full surface-container-highest flex items-center justify-center text-on-surface-variant font-bold group-hover:bg-primary-container group-hover:text-white transition-colors">D</span>
<span class="text-2xl font-headline font-bold text-on-surface">2</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant/30"></div>
</button>
</div>
<!-- Decorative Illustration -->
<div class="mt-12 flex justify-center opacity-40 mix-blend-multiply grayscale">
<img alt="Abstract Background" class="w-full max-w-[200px] object-contain" data-alt="minimalist geometric abstract education shapes in emerald green and soft beige clean background academic style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDQzyKhI4FcEfw__lEWGGbG7Ut2hDSKmIpXFfrXp2FKr8s8PCBn8ZTssRIL-j2WjDJaElN-rvIWDQ2TyeGmZrKvwhuAXyBuvYXqf9xbaFHmFw_jTn4ikRFspmmTLefPEJ66u4a543SvS5hYZOaCbgGb24YeUfhJrgQVqlHCafkRoJLRUMzNrhnnxRzoSTbJAV-HyHb9fVdQWHv5nGuNxfNCnCJJ6RWCKQBeBrBHxiSlptWKmZGmwkuOPxch2SV-Zdby-0JyywMZHQ"/>
</div>
</main>
<!-- Bottom Sticky Bar -->
<footer class="w-full max-w-md fixed bottom-0 px-6 pb-10 pt-6 bg-surface/90 backdrop-blur-xl z-50 rounded-t-xl">
<div class="flex flex-col gap-6">
<!-- Progress Dots -->
<div class="flex justify-center gap-2 items-center">
<div class="w-2.5 h-2.5 rounded-full bg-primary shadow-sm shadow-primary/20"></div>
<div class="w-2.5 h-2.5 rounded-full bg-primary shadow-sm shadow-primary/20"></div>
<div class="w-3.5 h-3.5 rounded-full bg-primary/20 flex items-center justify-center relative">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<div class="absolute inset-0 rounded-full border-2 border-primary/40 animate-ping opacity-25"></div>
</div>
<div class="w-2 h-2 rounded-full bg-outline-variant/40"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant/40"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant/40"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant/40"></div>
</div>
<!-- Next Button -->
<button class="w-full py-5 rounded-full bg-gradient-to-br from-primary to-primary-container text-white font-headline font-extrabold text-lg flex items-center justify-center gap-3 shadow-lg shadow-primary/30 active:scale-95 transition-transform">
                Next
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</footer>
<!-- Invisible spacer for fixed footer -->
<div class="h-40 w-full shrink-0"></div>
</body></html>
